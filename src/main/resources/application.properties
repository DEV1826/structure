# Configuration du Serveur
server.port=${PORT:8081}
server.forward-headers-strategy=framework
spring.application.name=Structure-Backend

# Configuration Base de Données (MySQL/MariaDB - Local)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/structure}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuration JWT (Doit correspondre à votre logique de sécurité)
# Assurez-vous que ces clés correspondent à celles utilisées dans votre AuthenticationService
security.jwt.secret-key=votre_clé_secrète_très_longue_et_sécurisée_pour_le_backend_java_256bits
security.jwt.expiration-time=86400000

# Configuration Campost (Exemple - Vérifiez le préfixe dans CampostProperties.java)
campost.api-base-url=https://demo.campost.cm/api
campost.public-key=votre_cle_publique_ici
campost.private-key=votre_cle_privee_ici
campost.webhook-secret=votre_secret_webhook