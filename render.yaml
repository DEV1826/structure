databases:
  - name: structure-db
    databaseName: structure_backend
    plan: free
    user: structure_user

services:
  - type: web
    name: structure-backend
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: structure-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: structure-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: structure-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: security.jwt.secret-key
        sync: false
      - key: security.jwt.expiration-time
        value: 86400000